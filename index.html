<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لانچر بازی‌های تحت وب | PixelGTV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Tahoma', 'IRANSans', 'Vazir', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #19233c 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* کانتینر اصلی */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* هدر و عنوان - جدید با لوگو */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        /* کانتینر لوگو + عنوان */
        .logo-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.25);
            padding: 0.8rem 2rem;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* استایل لوگو PNG */
        .custom-logo {
            height: 65px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            transition: transform 0.2s ease;
        }

        .custom-logo:hover {
            transform: scale(1.05);
        }

        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(to left, #e0eafc, #cfdef3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
            margin: 0;
        }

        .header p {
            color: #a3b5d9;
            margin-top: 0.5rem;
            font-size: 1rem;
            border-bottom: 1px dashed #2c3e66;
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        /* شبکه باکس‌ها (دکوراتیو کارت بازی) */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            justify-items: center;
            align-items: stretch;
        }

        /* استایل باکس هر بازی */
        .game-card {
            background: rgba(20, 30, 55, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 2rem;
            width: 100%;
            max-width: 320px;
            padding: 1.5rem 1rem 1.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .game-card:hover {
            transform: translateY(-12px);
            background: rgba(30, 45, 80, 0.9);
            border-color: #ffb347;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        }

        /* آیکون بازی (اموجی یا تصویر پیش‌فرض) */
        .game-icon {
            font-size: 4.2rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: rgba(0,0,0,0.3);
            width: 85px;
            height: 85px;
            line-height: 1.3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            transition: 0.2s;
        }

        .game-card:hover .game-icon {
            transform: scale(1.05);
        }

        .game-title {
            font-size: 1.7rem;
            font-weight: bold;
            color: #f2f4ff;
            margin: 0.75rem 0 0.5rem;
        }

        .game-description {
            font-size: 0.85rem;
            color: #b9c8ff;
            margin-bottom: 1.2rem;
            padding: 0 0.5rem;
            line-height: 1.4;
        }

        .play-badge {
            background: #ff9800;
            color: #1e2a3a;
            display: inline-block;
            padding: 0.5rem 1.6rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .game-card:hover .play-badge {
            background: #ffb347;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        /* فوتر */
        .footer {
            text-align: center;
            margin-top: 4rem;
            color: #6c7ea6;
            font-size: 0.8rem;
            border-top: 1px solid #253458;
            padding-top: 2rem;
        }

        /* ریسپانسیو */
        @media (max-width: 650px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .logo-title {
                padding: 0.5rem 1rem;
                gap: 0.8rem;
            }
            .custom-logo {
                height: 45px;
            }
            .game-grid {
                gap: 1.2rem;
            }
            .game-card {
                padding: 1rem 0.8rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- بخش لوگو + عنوان سایت -->
        <div class="logo-title">
            <!-- ⚠️ مسیر لوگو رو اینجا به فایل PNG خودت تغییر بده -->
            <img src="logo.png" alt="لوگوی سایت" class="custom-logo" onerror="this.onerror=null; this.src='https://placehold.co/200x80?text=LOGO+Not+Found';">
            <h1>PixelGTV / Game Online</h1>
        </div>
        <p>به جمع‌آوری بازی‌های تحت‌وب خوش آمدی | بازی های بیشتر به زودی</p>
    </div>

    <div class="game-grid" id="gameGrid">
        <!-- باکس بازی 1 : 2048 کلاسیک -->
        <div class="game-card" data-url="https://play2048.co/">
            <div class="game-icon">🔢</div>
            <div class="game-title">2048</div>
            <div class="game-description">معمای ترکیب اعداد | معمایی اعتیادآور و هوشمندانه</div>
            <div class="play-badge">✨ شروع بازی ✨</div>
        </div>
    </div>

    <div class="footer">
        ⚡ نسخه اولیه ⚡
        <br>
    ساخته شده برای سرگرمی شما Jalaluddin Arab
    </div>
</div>

<script>
    const gameBoxes = document.querySelectorAll('.game-card');

    function redirectToGame(event) {
        let targetCard = event.currentTarget;
        if(targetCard && targetCard.dataset.url) {
            const gameUrl = targetCard.dataset.url;
            window.open(gameUrl, '_blank');
        } else {
            console.warn("آدرس بازی موجود نیست!");
            alert("لطفاً دوباره تلاش کنید. لینک بازی یافت نشد.");
        }
    }

    gameBoxes.forEach(card => {
        card.addEventListener('click', redirectToGame);
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.addEventListener('keypress', function(e) {
            if(e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                redirectToGame.call(card, e);
            }
        });
    });

    console.log("✅ لانچر بازی آماده است — روی هر باکس کلیک کن تا به بازی مورد نظر بری");
</script>
</body>
</html>
