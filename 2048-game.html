<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 | بازی کلاسیک اعداد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #f9f3e8 0%, #e8dec8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: #bbada0;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .game-header {
            background: #bbada0;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-size: 60px;
            font-weight: bold;
            color: #eee4da;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 0;
        }

        .scores {
            display: flex;
            gap: 15px;
        }

        .score-box {
            background: #bbada0;
            background: #eee4da;
            border-radius: 8px;
            padding: 10px 20px;
            text-align: center;
            min-width: 100px;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
        }

        .score-label {
            font-size: 14px;
            color: #776e65;
            font-weight: bold;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #776e65;
        }

        .new-game-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .new-game-btn:hover {
            background: #9f8a76;
            transform: scale(1.02);
        }

        /* صفحه بازی */
        .grid-container {
            background: #cdc1b4;
            border-radius: 12px;
            padding: 15px;
            display: inline-block;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: #bbada0;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            transition: all 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* رنگ‌بندی اعداد 2048 */
        .cell[data-value="2"] { background: #eee4da; color: #776e65; }
        .cell[data-value="4"] { background: #ede0c8; color: #776e65; }
        .cell[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .cell[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .cell[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .cell[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 32px; }
        .cell[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 32px; }
        .cell[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 32px; }
        .cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 28px; }
        .cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 28px; }
        .cell[data-value="4096"] { background: #3c3a32; color: #f9f6f2; font-size: 28px; }

        .game-message {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #776e65;
            background: #eee4da;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .game-message.show {
            display: block;
        }

        @media (max-width: 550px) {
            .cell {
                width: 65px;
                height: 65px;
                font-size: 28px;
            }
            .game-grid {
                gap: 10px;
            }
            h1 {
                font-size: 40px;
            }
            .score-box {
                min-width: 70px;
                padding: 6px 12px;
            }
            .score-value {
                font-size: 22px;
            }
        }

        @media (max-width: 450px) {
            .cell {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }
            .cell[data-value="128"], .cell[data-value="256"], .cell[data-value="512"] {
                font-size: 20px;
            }
            .cell[data-value="1024"], .cell[data-value="2048"], .cell[data-value="4096"] {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-header">
            <div class="title-section">
                <h1>۲۰۴۸</h1>
                <button class="new-game-btn" id="newGameBtn">بازی جدید</button>
            </div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">امتیاز</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">بهترین</div>
                    <div class="score-value" id="bestScore">0</div>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <div class="game-grid" id="gameGrid">
                <!-- ۴x۴ grid به صورت داینامیک پر می‌شود -->
            </div>
        </div>
        <div class="game-message" id="gameMessage"></div>
    </div>
    <div style="text-align: center; margin-top: 20px; color: #776e65; font-size: 14px;">
        با کلیدهای جهت دار (←↑↓→) یا کشیدن صفحه حرکت کنید
    </div>
</div>

<script>
    let board = [];
    let score = 0;
    let bestScore = localStorage.getItem('bestScore2048') ? parseInt(localStorage.getItem('bestScore2048')) : 0;
    let gameActive = true;
    let gridSize = 4;

    const scoreElement = document.getElementById('score');
    const bestScoreElement = document.getElementById('bestScore');
    const gameMessageDiv = document.getElementById('gameMessage');

    // نمایش بهترین امتیاز
    bestScoreElement.innerText = bestScore;

    // مقداردهی اولیه تخته
    function initBoard() {
        board = Array(gridSize).fill().map(() => Array(gridSize).fill(0));
        addRandomTile();
        addRandomTile();
        renderBoard();
        updateScoreUI();
        gameActive = true;
        gameMessageDiv.classList.remove('show');
        gameMessageDiv.innerText = '';
    }

    // اضافه کردن تایل تصادفی ۲ یا ۴
    function addRandomTile() {
        let emptyCells = [];
        for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
                if (board[i][j] === 0) emptyCells.push([i, j]);
            }
        }
        if (emptyCells.length === 0) return;
        const [row, col] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        board[row][col] = Math.random() < 0.9 ? 2 : 4;
    }

    // رندر گرید در صفحه
    function renderBoard() {
        const gridContainer = document.getElementById('gameGrid');
        gridContainer.innerHTML = '';
        for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
                const cellValue = board[i][j];
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.setAttribute('data-value', cellValue);
                cell.innerText = cellValue !== 0 ? cellValue : '';
                gridContainer.appendChild(cell);
            }
        }
    }

    function updateScoreUI() {
        scoreElement.innerText = score;
        if (score > bestScore) {
            bestScore = score;
            bestScoreElement.innerText = bestScore;
            localStorage.setItem('bestScore2048', bestScore);
        }
    }

    // حرکت اصلی و منطق ترکیب
    function move(direction) {
        if (!gameActive) return false;

        let oldBoard = JSON.parse(JSON.stringify(board));
        let moved = false;
        let addedScore = 0;

        if (direction === 'left') {
            for (let i = 0; i < gridSize; i++) {
                let row = board[i].filter(v => v !== 0);
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j+1]) {
                        row[j] *= 2;
                        addedScore += row[j];
                        row.splice(j+1, 1);
                    }
                }
                let newRow = row.concat(Array(gridSize - row.length).fill(0));
                if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) moved = true;
                board[i] = newRow;
            }
        } 
        else if (direction === 'right') {
            for (let i = 0; i < gridSize; i++) {
                let row = board[i].filter(v => v !== 0);
                for (let j = row.length - 1; j > 0; j--) {
                    if (row[j] === row[j-1]) {
                        row[j] *= 2;
                        addedScore += row[j];
                        row.splice(j-1, 1);
                        j--;
                    }
                }
                let newRow = Array(gridSize - row.length).fill(0).concat(row);
                if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) moved = true;
                board[i] = newRow;
            }
        }
        else if (direction === 'up') {
            for (let j = 0; j < gridSize; j++) {
                let col = [];
                for (let i = 0; i < gridSize; i++) {
                    if (board[i][j] !== 0) col.push(board[i][j]);
                }
                for (let i = 0; i < col.length - 1; i++) {
                    if (col[i] === col[i+1]) {
                        col[i] *= 2;
                        addedScore += col[i];
                        col.splice(i+1, 1);
                    }
                }
                let newCol = col.concat(Array(gridSize - col.length).fill(0));
                for (let i = 0; i < gridSize; i++) {
                    if (board[i][j] !== newCol[i]) moved = true;
                    board[i][j] = newCol[i];
                }
            }
        }
        else if (direction === 'down') {
            for (let j = 0; j < gridSize; j++) {
                let col = [];
                for (let i = 0; i < gridSize; i++) {
                    if (board[i][j] !== 0) col.push(board[i][j]);
                }
                for (let i = col.length - 1; i > 0; i--) {
                    if (col[i] === col[i-1]) {
                        col[i] *= 2;
                        addedScore += col[i];
                        col.splice(i-1, 1);
                        i--;
                    }
                }
                let newCol = Array(gridSize - col.length).fill(0).concat(col);
                for (let i = 0; i < gridSize; i++) {
                    if (board[i][j] !== newCol[i]) moved = true;
                    board[i][j] = newCol[i];
                }
            }
        }

        if (moved) {
            score += addedScore;
            updateScoreUI();
            addRandomTile();
            renderBoard();
            checkGameStatus();
            return true;
        }
        return false;
    }

    function checkGameStatus() {
        // بررسی برد (رسیدن به 2048)
        for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
                if (board[i][j] === 2048) {
                    gameActive = false;
                    gameMessageDiv.innerText = '🎉 برنده شدی! 🎉 | روی بازی جدید کلیک کن';
                    gameMessageDiv.classList.add('show');
                    return;
                }
            }
        }

        // بررسی باخت (هیچ حرکت ممکن نیست)
        let canMove = false;
        for (let i = 0; i < gridSize; i++) {
            for (let j = 0; j < gridSize; j++) {
                if (board[i][j] === 0) canMove = true;
                if (j < gridSize-1 && board[i][j] === board[i][j+1]) canMove = true;
                if (i < gridSize-1 && board[i][j] === board[i+1][j]) canMove = true;
            }
        }
        if (!canMove) {
            gameActive = false;
            gameMessageDiv.innerText = '💀 بازی تمام شد! 💀 | دکمه بازی جدید';
            gameMessageDiv.classList.add('show');
        }
    }

    function resetGame() {
        score = 0;
        updateScoreUI();
        initBoard();
    }

    // کنترل با کیبورد
    function handleKeyPress(e) {
        const key = e.key;
        if (!gameActive) return;
        let direction = null;
        if (key === 'ArrowLeft') direction = 'left';
        else if (key === 'ArrowRight') direction = 'right';
        else if (key === 'ArrowUp') direction = 'up';
        else if (key === 'ArrowDown') direction = 'down';
        if (direction) {
            e.preventDefault();
            move(direction);
        }
    }

    // پشتیبانی از لمس برای موبایل
    let touchStartX = 0, touchStartY = 0;
    function handleTouchStart(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }
    function handleTouchEnd(e) {
        if (!gameActive) return;
        let diffX = e.changedTouches[0].clientX - touchStartX;
        let diffY = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;
        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 0) move('right');
            else move('left');
        } else {
            if (diffY > 0) move('down');
            else move('up');
        }
        e.preventDefault();
    }

    document.addEventListener('keydown', handleKeyPress);
    document.addEventListener('touchstart', handleTouchStart);
    document.addEventListener('touchend', handleTouchEnd);
    document.getElementById('newGameBtn').addEventListener('click', () => resetGame());

    // شروع بازی
    initBoard();
</script>
</body>
</html>
